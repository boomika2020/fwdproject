<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Login | Hospital Systems</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-side-panel">
            <div class="overlay"></div>
            <div class="panel-content">
                <div class="big-logo">H</div>
                <h2>Hospital Systems</h2>
            </div>
        </div>

        <div class="login-form-area">
            <div class="form-card">
                <h3>System Login</h3>
                
                <form action="dashboard.html">
                    <div class="input-group">
                        <label>Employee ID</label>
                        <input type="text" placeholder="Enter ID" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Secure Password</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="login-btn">Authorize Access</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
